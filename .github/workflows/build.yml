name: Build

on:
  pull_request:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install nfpm
        run: |
          curl -sSfL https://github.com/goreleaser/nfpm/releases/download/v2.41.3/nfpm_2.41.3_amd64.deb -o /tmp/nfpm.deb
          sudo apt-get install -y /tmp/nfpm.deb

      - name: Build Debian package
        run: make deb

      - name: Inspect package
        run: |
          deb=$(ls out/*.deb)
          dpkg-deb -I "$deb"
          dpkg-deb -c "$deb" | grep -E 'gpstak|systemd|default'

      - uses: actions/upload-artifact@v4
        with:
          name: gpstak-deb
          path: out/*.deb

