# Usage: VERSION=1.0.0 nfpm package -f nfpm.yaml -p deb -t out/
name: gpstak
arch: all
platform: linux
version: ${VERSION}
release: "1"
section: net
priority: optional
maintainer: "Sensors & Signals LLC <oss@snstac.com>"
vendor: "Sensors & Signals LLC"
homepage: https://github.com/snstac/gpstak
license: Apache-2.0
description: |
  Network GPS for TAK. Reads gpsd, emits Cursor on Target position events
  through PyTAK, and can fan out raw NMEA for WinTAK.

depends:
  - python3
  - pytak
  - gpsd
recommends:
  - cockpit-gpstak

contents:
  - src: ./gpstak/gpstak.py
    dst: /usr/local/bin/gpstak
    file_info:
      mode: 0755
  - src: ./packaging/default/gpstak
    dst: /etc/default/gpstak
    type: config|noreplace
    file_info:
      mode: 0644
  - src: ./packaging/systemd/gpstak.service
    dst: /lib/systemd/system/gpstak.service
    file_info:
      mode: 0644

scripts:
  postinstall: ./packaging/postinst.sh
  preremove: ./packaging/prerm.sh

